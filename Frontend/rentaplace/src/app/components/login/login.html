<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm p-4">

        <h2 class="text-center fw-bold mb-4" style="color:#1a1a2e;">Login</h2>

        <form (ngSubmit)="onLogin()">

          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="loginData.email"
              name="email"
              placeholder="Enter your email"
              required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="loginData.password"
              name="password"
              placeholder="Enter your password"
              required>
          </div>

          <button type="submit" class="btn btn-red w-100 py-2 fw-semibold">
            Login
          </button>

        </form>

        <p class="text-center mt-3 text-muted" style="font-size:14px;">
          Don't have an account?
          <a routerLink="/register" style="color:#e94560;">Register here</a>
        </p>

      </div>
    </div>
  </div>
</div>
