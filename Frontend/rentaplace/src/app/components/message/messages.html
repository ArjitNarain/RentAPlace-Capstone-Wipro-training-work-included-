<h2>Messages</h2>

<!-- Send message form -->
<div style="border:1px solid #ccc; padding:12px; margin-bottom:20px; max-width:400px;">

  <h4>Send a Message</h4>

  <label>Receiver User ID</label><br>
  <input type="number" [(ngModel)]="receiverId" name="receiverId" placeholder="Enter user ID to message">

  <br><br>

  <label>Message</label><br>
  <input type="text" [(ngModel)]="newMessage" name="message" placeholder="Type your message..." style="width:100%;">

  <br><br>

  <button (click)="sendMessage()">Send</button>

</div>

<hr>

<!-- Messages list -->
<h4>Conversation History</h4>

<p *ngIf="messages.length === 0" style="color:gray;">No messages yet.</p>

<div *ngFor="let msg of messages" style="border:1px solid #eee; margin:8px 0; padding:10px;">
  <p>
    <b>From:</b> {{ isMine(msg.senderId) ? 'You' : 'User #' + msg.senderId }}
    &nbsp;→&nbsp;
    <b>To:</b> {{ isMine(msg.receiverId) ? 'You' : 'User #' + msg.receiverId }}
  </p>
  <p>{{ msg.content }}</p>
  <small style="color:gray;">{{ msg.sentAt | date:'short' }}</small>
</div>
