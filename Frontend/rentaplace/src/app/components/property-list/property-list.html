<div class="container mt-4">

  <!-- Search Bar -->
  <div class="card p-3 mb-4 shadow-sm">
    <div class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Location</label>
        <input class="form-control"
               [(ngModel)]="location"
               placeholder="e.g. Mumbai, Goa">
      </div>
      <div class="col-md-3">
        <label class="form-label fw-semibold small">Type</label>
        <select class="form-select" [(ngModel)]="type">
          <option value="">All Types</option>
          <option value="Flat">Flat</option>
          <option value="Villa">Villa</option>
          <option value="Apartment">Apartment</option>
        </select>
      </div>
      <div class="col-auto">
        <button class="btn btn-red" (click)="search()">Search</button>
      </div>
      <div class="col-auto">
        <button class="btn btn-secondary" (click)="loadProperties()">Reset</button>
      </div>
    </div>
  </div>

  <h4 class="fw-bold mb-3" style="color:#1a1a2e;">Available Properties</h4>

  <p *ngIf="properties.length === 0" class="text-muted text-center mt-4">
    No properties found.
  </p>

  <!-- 4 per row -->
  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-3">

    <div class="col" *ngFor="let p of properties">
      <div class="card h-100 shadow-sm property-card">

        <!-- Image -->
        <img *ngIf="p.imagePath"
             [src]="p.imagePath"
             class="card-img-top"
             alt="{{ p.title }}"
             style="height:160px; object-fit:cover;">

        <div *ngIf="!p.imagePath"
             style="height:160px;
                    background:linear-gradient(135deg,#1a1a2e,#0f3460);
                    display:flex; align-items:center;
                    justify-content:center;
                    color:rgba(255,255,255,0.3);
                    font-size:12px;">
          No Image
        </div>

        <!-- Card Body -->
        <div class="card-body d-flex flex-column p-3">
          <h6 class="fw-bold mb-1" style="color:#1a1a2e;">{{ p.title }}</h6>
          <p class="text-muted small mb-1">📍 {{ p.location }}</p>
          <p class="text-muted small mb-2">🏠 {{ p.propertyType }}</p>
          <p class="price mb-3">₹{{ p.price }} / night</p>
          <p class="text-muted small mb-3"
             style="overflow:hidden; display:-webkit-box;
                    -webkit-line-clamp:2; -webkit-box-orient:vertical;">
            {{ p.description }}
          </p>

          
          <div class="mt-auto d-flex gap-2 flex-wrap">
            <button class="btn btn-red btn-sm"
                    (click)="viewDetails(p.id)">
              View Details
            </button>
            <button class="btn btn-navy btn-sm"
                    *ngIf="authService.isOwner()"
                    (click)="editProperty(p.id)">
              Edit
            </button>
            <button class="btn btn-danger btn-sm"
                    *ngIf="authService.isOwner()"
                    (click)="deleteProperty(p.id)">
              Delete
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>
